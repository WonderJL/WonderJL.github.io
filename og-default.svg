<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="token" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#608afa" />
      <stop offset="100%" stop-color="#2548d8" />
    </radialGradient>
    <style>
      .mono { font-family: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: 'Fira Sans', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fafaf9" />

  <!-- Subtle grid -->
  <g stroke="#e7e7e5" stroke-width="1" stroke-dasharray="3 10" opacity="0.7">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Top eyebrow -->
  <text x="80" y="110" class="mono" font-size="20" letter-spacing="3" fill="#2548d8" font-weight="600">
    RELIABILITY NARRATIVE PORTFOLIO
  </text>

  <!-- Main thesis -->
  <text x="80" y="220" class="sans" font-size="58" font-weight="600" fill="#18181a" letter-spacing="-1">
    <tspan x="80" dy="0">I build engineering systems</tspan>
    <tspan x="80" dy="72">that make AI-assisted delivery</tspan>
    <tspan x="80" dy="72">reviewable.</tspan>
  </text>

  <!-- Bottom-left name lockup -->
  <g transform="translate(80 540)">
    <text x="0" y="0" class="mono" font-size="22" font-weight="600" fill="#18181a">
      jeff<tspan fill="#2548d8">.</tspan>leung
    </text>
    <text x="0" y="32" class="mono" font-size="14" letter-spacing="2" fill="#737370">
      SENIOR SOFTWARE ENGINEER
    </text>
  </g>

  <!-- Right-side miniature reliability map -->
  <g transform="translate(820 220)">
    <!-- Edges -->
    <g fill="none" stroke="#3b66f0" stroke-width="2" stroke-linecap="round" opacity="0.9">
      <path d="M 20 130 C 50 130, 60 95, 90 80" />
      <path d="M 90 80 C 130 80, 130 130, 165 130" />
      <path d="M 165 130 C 200 130, 200 180, 240 200" />
      <path d="M 240 200 C 260 180, 270 140, 295 120" />
      <path d="M 295 120 C 320 100, 320 70, 340 60" />
      <path d="M 295 120 C 320 160, 320 200, 340 220" />
    </g>

    <!-- Nodes -->
    <g>
      <circle cx="20" cy="130" r="14" fill="#ffffff" stroke="#3b66f0" stroke-width="2" />
      <circle cx="20" cy="130" r="5" fill="#3b66f0" />

      <circle cx="90" cy="80" r="14" fill="#ffffff" stroke="#3b66f0" stroke-width="2" />
      <circle cx="90" cy="80" r="5" fill="#3b66f0" />

      <circle cx="165" cy="130" r="14" fill="#ffffff" stroke="#3b66f0" stroke-width="2" />
      <circle cx="165" cy="130" r="5" fill="#3b66f0" />

      <circle cx="240" cy="200" r="14" fill="#ffffff" stroke="#3b66f0" stroke-width="2" />
      <circle cx="240" cy="200" r="5" fill="#3b66f0" />

      <circle cx="295" cy="120" r="14" fill="#ffffff" stroke="#3b66f0" stroke-width="2" />
      <circle cx="295" cy="120" r="5" fill="#3b66f0" />

      <circle cx="340" cy="60" r="14" fill="#ffffff" stroke="#3b66f0" stroke-width="2" />
      <circle cx="340" cy="60" r="5" fill="#3b66f0" />

      <circle cx="340" cy="220" r="14" fill="#ffffff" stroke="#3b66f0" stroke-width="2" />
      <circle cx="340" cy="220" r="5" fill="url(#token)" />
    </g>

    <!-- Group label -->
    <text x="0" y="-25" class="mono" font-size="11" letter-spacing="2" fill="#737370">
      SYSTEM RELIABILITY MAP
    </text>
  </g>

  <!-- Bottom-right URL -->
  <text x="1120" y="570" text-anchor="end" class="mono" font-size="16" fill="#737370">
    jeffleung.tech
  </text>

  <!-- Accent corner mark -->
  <rect x="1140" y="60" width="20" height="20" rx="2" fill="#3b66f0" />
</svg>
